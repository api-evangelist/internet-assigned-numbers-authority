      with the provider's published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://www.iana.org/assignments/
          - https://data.iana.org/time-zones/
          - https://www.iana.org/domains/
        unit: 1
        price: '0.00'
        userMultiplied: false
